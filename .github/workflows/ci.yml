name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      PYTHONNOUSERSITE: "1"
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install ruff mypy pytest pytest-cov pytest-asyncio pytest-homeassistant-custom-component homeassistant

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: mypy --explicit-package-bases custom_components/vivosun_growhub

      - name: Pytest with coverage gates
        run: >-
          pytest
          -p pytest_asyncio.plugin
          -p pytest_homeassistant_custom_component.plugins
          -p pytest_cov.plugin
          --cov=custom_components.vivosun_growhub.api
          --cov=custom_components.vivosun_growhub.aws_auth
          --cov=custom_components.vivosun_growhub.mqtt_client
          --cov=custom_components.vivosun_growhub.shadow
          --cov=custom_components.vivosun_growhub.coordinator
          --cov-report=term-missing
          --cov-report=xml
          --cov-fail-under=80
          -q
          tests/
