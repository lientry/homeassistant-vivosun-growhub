name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build release archive
        uses: thedoctor0/zip-release@0.7.6
        with:
          type: zip
          directory: custom_components/vivosun_growhub
          filename: vivosun_growhub.zip
          exclusions: "*.git* .editorconfig *.vscode* *.github* __pycache__/* *.pyc"

      - name: Upload release archive
        if: github.event_name == 'release'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: custom_components/vivosun_growhub/vivosun_growhub.zip
          asset_name: vivosun_growhub.zip
          tag: ${{ github.ref }}
          overwrite: true

      - name: Upload workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: vivosun_growhub.zip
          path: custom_components/vivosun_growhub/vivosun_growhub.zip
