set_duct_fan_auto_threshold:
  name: Set Duct Fan Auto Threshold
  description: Set or clear a duct fan auto-threshold field.
  target:
    entity:
      integration: vivosun_growhub
      domain: fan
  fields:
    field:
      name: Field
      description: Auto-threshold field key to modify (for example tMin, tMax, hMin, hMax, vpdMin, vpdMax).
      required: true
      example: "tMin"
      selector:
        text:
    value:
      name: Value
      description: Integer value for the threshold field. Set to null or omit to clear the field.
      required: false
      example: 350
      selector:
        number:
          step: 1
start_support_capture:
  name: Start Support Capture
  description: Start a local support-capture session for diagnostics export.
  fields:
    entry_id:
      name: Entry ID
      description: Optional config entry id. Required only if multiple Vivosun entries are configured.
      required: false
      selector:
        text:
    max_events:
      name: Max Events
      description: Maximum number of redacted capture events to keep in the local diagnostics buffer.
      required: false
      example: 500
      default: 500
      selector:
        number:
          min: 10
          max: 5000
          step: 10
stop_support_capture:
  name: Stop Support Capture
  description: Stop a local support-capture session. Download diagnostics afterward to export the captured data.
  fields:
    entry_id:
      name: Entry ID
      description: Optional config entry id. Required only if multiple Vivosun entries are configured.
      required: false
      selector:
        text:
